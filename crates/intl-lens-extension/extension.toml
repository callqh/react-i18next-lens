id = "react-i18next-lens"
name = "React i18next Lens"
version = "0.0.3"
schema_version = 1
license = "MIT"
authors = ["callqh"]
description = "React i18next analysis for Zed - inline source-locale messages, hover, definitions, and diagnostics"
repository = "https://github.com/callqh/react-i18next-lens"

[language_servers.react-i18next-lens]
name = "React i18next Lens Language Server"
languages = ["TypeScript", "TSX", "JavaScript", "JSX"]

[language_servers.react-i18next-lens.language_ids]
"TypeScript" = "typescript"
"TSX" = "typescriptreact"
"JavaScript" = "javascript"
"JSX" = "javascriptreact"
